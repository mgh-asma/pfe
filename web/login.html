<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackr — Connexion</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f3f4f6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #fff;
    border: 1px solid #e4e6ea;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
  }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #e4e6ea;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 16px;
    font-weight: 600;
    color: #0f1923;
    letter-spacing: -0.01em;
  }
  .logo span { color: #6b7280; font-weight: 400; font-size: 14px; }

  .card-body { padding: 24px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .field input {
    width: 100%;
    border: 1px solid #e4e6ea;
    border-radius: 4px;
    padding: 9px 12px;
    font-size: 14px;
    color: #0f1923;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: #0f1923; }
  .field input::placeholder { color: #d1d5db; }

  .btn {
    width: 100%;
    background: #0f1923;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:hover { background: #1e2d3d; }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }

  .err {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 4px;
    color: #dc2626;
    font-size: 13px;
    padding: 8px 12px;
    margin-top: 12px;
    display: none;
  }
  .err.show { display: block; }

  .card-footer {
    padding: 12px 24px;
    background: #f9fafb;
    border-top: 1px solid #e4e6ea;
    font-size: 11px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">Trackr <span>/ localisation indoor</span></div>
    <div style="width:8px;height:8px;border-radius:50%;background:#e4e6ea"></div>
  </div>
  <div class="card-body">
    <div class="field">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="btn" onclick="doLogin()">
      <span id="btn-txt">Se connecter</span>
      <span id="btn-arrow">→</span>
    </button>
    <div class="err" id="err">Identifiants incorrects</div>
  </div>
  <div class="card-footer">Plateforme BLE RTLS — Stage de fin d'études</div>
</div>

<script>
  var token = localStorage.getItem("rtls_token");
  if (token) {
    fetch("/api/me", { headers: { "X-Token": token } })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.status === "ok") window.location.href = "/tags-page"; })
      .catch(function() {});
  }

  ["username","password"].forEach(function(id) {
    document.getElementById(id).addEventListener("keydown", function(e) {
      if (e.key === "Enter") doLogin();
    });
  });

  function doLogin() {
    var u = document.getElementById("username").value.trim();
    var p = document.getElementById("password").value;
    var btn = document.getElementById("btn");
    var err = document.getElementById("err");
    if (!u || !p) { err.textContent = "Remplissez tous les champs"; err.classList.add("show"); return; }
    btn.disabled = true;
    document.getElementById("btn-txt").textContent = "Connexion...";
    document.getElementById("btn-arrow").textContent = "";
    err.classList.remove("show");
    fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: p })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status === "ok") {
        localStorage.setItem("rtls_token", d.token);
        localStorage.setItem("rtls_username", d.username);
        localStorage.setItem("rtls_role", d.role);
        window.location.href = "/tags-page";
      } else {
        err.textContent = d.message || "Identifiants incorrects";
        err.classList.add("show");
        btn.disabled = false;
        document.getElementById("btn-txt").textContent = "Se connecter";
        document.getElementById("btn-arrow").textContent = "→";
      }
    })
    .catch(function() {
      err.textContent = "Erreur de connexion";
      err.classList.add("show");
      btn.disabled = false;
      document.getElementById("btn-txt").textContent = "Se connecter";
      document.getElementById("btn-arrow").textContent = "→";
    });
  }
</script>
</body>
</html>
